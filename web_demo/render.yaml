services:
  - type: web
    name: speech-emotion-demo
    runtime: python
    rootDir: web_demo
    buildCommand: >-
      pip install torch --index-url https://download.pytorch.org/whl/cpu
      && pip install -r requirements.txt
    startCommand: bash -c "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT"
